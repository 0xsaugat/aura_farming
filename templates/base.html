<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>{% block title %}AURA-Nepal{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        .panel {
            background: rgba(255, 253, 248, 0.9);
            border: 1px solid #e6dfd1;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 18px 50px rgba(82, 96, 109, 0.12);
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="{% block body_class %}bg-background text-on-surface{% endblock %}">
    <div{% if show_dashboard_sidebar %} class="flex min-h-screen"{% endif %}>
        {% if show_dashboard_sidebar %}
            {% include 'includes/sidebar.html' %}
            <div class="min-w-0 flex-1">
        {% endif %}
        {% block content %}{% endblock %}
        {% if show_dashboard_sidebar %}
            </div>
        {% endif %}
    </div>
</body>
</html>
